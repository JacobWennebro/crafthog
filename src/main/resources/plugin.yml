name: CraftHog
version: '${version}'

main: com.wennebro.crafthog.Crafthog
api-version: '26.2'
load: POSTWORLD

commands:
  chog:
    description: Crafthog admin commands
    usage: /chog <reload>
    permission: crafthog.admin
    permission-message: You don't have permission to use this command.

permissions:
  crafthog.admin:
    description: Allows use of all Crafthog admin commands
    default: op
