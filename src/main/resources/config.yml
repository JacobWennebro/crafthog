# CraftHog by Jacob Wennebro (wennebro.com)

# Prefix for all PostHog events (e.g. mc_player_joined)
events_prefix: mc

posthog:
  # Your PostHog project API key
  api-key: "your-api-key-here"
  
  # PostHog host URL (e.g. https://eu.i.posthog.com or https://app.posthog.com)
  host: "https://eu.i.posthog.com"
  
  # Enable debug mode for verbose logging
  debug: false

# Identify players in PostHog when they join (recommended).
identify_players: true

events:
  # --- Server Events ---
  # - plugin_enabled # Fired when the plugin starts up.
  # - plugin_disabled # Fired when the plugin shuts down.

  # --- Player Events ---
  # - player_joined # Fired when a player joins the server.
  # - player_left # Fired when a player leaves the server.
  # - player_died # Fired when a player dies.
  # - player_kill # Fired when a player kills another player.
  # - player_jumped # Fired when a player jumps. Very noisy — use with caution.
  # - player_sneaked # Fired when a player starts sneaking. Moderately noisy.
  # - player_ate # Fired when a player eats food. Moderately noisy without type filtering.

  # --- Command Events ---
  # - ran_command # Fired when a player runs a command.

  # --- World Events ---
  # - block_placed # Fired when a player places a block. Very noisy without type filtering.
  # - block_broken # Fired when a player breaks a block. Very noisy without type filtering.

settings:
  # Applies to: ran_command
  # When false, only known/registered commands are reported.
  # When true, everything the player types after '/' is reported.
  report_invalid_commands: true

  # Applies to: player_ate
  # Food types to track. Case-insensitive.
  # Empty list = ALL food items (moderately noisy).
  food_consumed_types:
    - GOLDEN_APPLE
    - ENCHANTED_GOLDEN_APPLE

  # Applies to: block_placed
  # Block types to track. Case-insensitive.
  # Empty list = ALL blocks (very noisy, not recommended).
  block_place_types:
    - BEDROCK

  # Applies to: block_broken
  # Block types to track. Case-insensitive.
  # Empty list = ALL blocks (very noisy, not recommended).
  block_break_types:
    - BEDROCK
